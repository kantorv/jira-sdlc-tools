name: Transition Jira Issue on PR Merge

on:
  pull_request:
    types:
      - closed

jobs:
  transition-jira:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Extract Jira issue key
        id: jira
        shell: bash
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"

          if [[ "$BRANCH" =~ ^(feature|hotfix)/([A-Z]+-[0-9]+)- ]]; then
            echo "key=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          else
            echo "No Jira issue found in branch '$BRANCH'. Skipping."
            exit 0
          fi

      - name: Find Done transition
        id: transition
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_ISSUE_TRANSITION_TOKEN }}
        shell: bash
        run: |
          RESPONSE=$(curl -fsS \
            -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_URL/rest/api/3/issue/${{ steps.jira.outputs.key }}/transitions")

          TRANSITION_ID=$(echo "$RESPONSE" | jq -r '
            .transitions[]
            | select(.to.name == "Done")
            | .id
          ' | head -n1)

          if [ -z "$TRANSITION_ID" ] || [ "$TRANSITION_ID" = "null" ]; then
            echo "No transition to Done is available."
            exit 0
          fi

          echo "id=$TRANSITION_ID" >> "$GITHUB_OUTPUT"

      - name: Transition Jira issue
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        shell: bash
        run: |
          curl -fsS \
            -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -X POST \
            "$JIRA_URL/rest/api/3/issue/${{ steps.jira.outputs.key }}/transitions" \
            -d "{
              \"transition\": {
                \"id\": \"${{ steps.transition.outputs.id }}\"
              }
            }"

          echo "Transitioned ${{ steps.jira.outputs.key }} to Done."