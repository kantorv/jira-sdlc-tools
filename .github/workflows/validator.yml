# Validates the plugin marketplace on every change landing on development
# or main. Gating main too means a release/sprint-* or hotfix/* PR (which
# merges into main per SDLC §3 Phase 4 / §4) can't carry a broken manifest
# or plugin.json into "production" — the release.yml run that follows a
# clean merge assumes a structurally green tree.
# Mirrors the checks documented in AGENTS.md → "Validating a change":
#   1. claude plugin validate --strict .   (marketplace.json schema,
#      duplicate plugin names, source-path ../ traversal, each plugin's
#      plugin.json — plus warnings-as-errors via --strict)
#   2. python3 -m json.tool                  (manifests are well-formed JSON;
#      a fallback that doesn't depend on the claude CLI at all)
# The skills themselves are prompt files with no build step, so there is
# nothing to compile or unit-test — these structural checks are the whole
# suite. See AGENTS.md for the rationale behind each one.
name: Validator

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate marketplace & plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Native install of the claude CLI — no npm, no Node toolchain. The
      # installer (https://claude.ai/install.sh) downloads a prebuilt binary
      # from downloads.claude.ai, SHA256-verifies it against Anthropic's
      # manifest, then runs the binary's own `claude install` to set up the
      # launcher at ~/.local/bin/claude. Pinned to the version these
      # manifests were last confirmed green against — bump deliberately; a
      # float would let an upstream schema change turn the gate red mid-week.
      # `bash -s -- 2.1.199` puts 2.1.199 in $1 (install.sh reads TARGET="$1"),
      # never $0. See claude plugin validate --help for --strict.
      - name: Install claude CLI (native, no npm)
        run: |
          curl -fsSL https://claude.ai/install.sh | bash -s -- 2.1.199
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate with claude plugin validate
        # Canonical structural check. --strict makes warnings (missing
        # metadata, non-kebab-case names, etc.) fail the job — the CLI's own
        # help recommends this flag for CI.
        timeout-minutes: 5
        run: claude plugin validate --strict .

      - name: Validate manifests are well-formed JSON
        # CLI-independent sanity net: catches a malformed manifest even if
        # install behavior changes upstream. Same two files the claude check
        # reads, by the same path it resolves them with.
        run: |
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
          python3 -m json.tool plugins/jira-sdlc/.claude-plugin/plugin.json > /dev/null
