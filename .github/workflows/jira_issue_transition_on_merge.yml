name: Transition Jira Issue on PR Merge

on:
  pull_request:
    types:
      - closed

jobs:
  transition-jira:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Extract Jira issue key
        id: jira
        shell: bash
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"

          if [[ "$BRANCH" =~ ^(feature|hotfix)/([A-Z]+-[0-9]+)- ]]; then
            echo "key=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          else
            echo "No Jira issue found in branch '$BRANCH'. Skipping."
            exit 0
          fi

      - name: Install acli
        shell: bash
        run: |
          set -euo pipefail
          # Resolve the current acli .deb from Atlassian's apt repo so this
          # auto-tracks new acli releases without a hard-coded version string.
          PACKAGES="https://acli.atlassian.com/linux/deb/dists/stable/main/binary-amd64/Packages"
          DEB=$(curl -fsSL "$PACKAGES" | awk '/^Package: acli$/{p=1} p && /^Filename:/{print $2; exit}')
          if [ -z "$DEB" ]; then
            echo "::error::acli .deb not found in Packages index at $PACKAGES"
            exit 1
          fi
          curl -fsSL -o /tmp/acli.deb "https://acli.atlassian.com/linux/deb/$DEB"
          sudo dpkg -i /tmp/acli.deb
          acli --version

      - name: Authenticate acli
        env:
          JIRA_URL: ${{ secrets.JIRA_ACCOUNT_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_ACCOUNT_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_ISSUE_TRANSITION_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # acli expects a bare site host (no https://); strip any scheme the secret may carry.
          SITE="${JIRA_URL#*://}"
          printf '%s' "$JIRA_TOKEN" | acli jira auth login \
            --site "$SITE" \
            --email "$JIRA_EMAIL" \
            --token
          acli jira auth status

      - name: Transition to Done
        shell: bash
        run: |
          set -euo pipefail
          KEY="${{ steps.jira.outputs.key }}"
          # Mirrors STATUS_DONE from jira-sdlc-tools.env.
          TARGET="Done"

          CUR=$(acli jira workitem view "$KEY" --json --fields status \
            | jq -r '.fields.status.name')
          echo "Issue $KEY is currently '$CUR'."
          if [ "$CUR" = "$TARGET" ]; then
            echo "Already $TARGET — skipping."
            exit 0
          fi

          acli jira workitem transition --key "$KEY" --status "$TARGET" --yes
          echo "Transitioned $KEY to $TARGET."
