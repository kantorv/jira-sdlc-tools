name: Transition Jira Issue on PR Merge

on:
  pull_request:
    types:
      - closed

jobs:
  transition-jira:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Extract Jira issue key
        id: jira
        shell: bash
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"

          if [[ "$BRANCH" =~ ^(feature|hotfix)/([A-Z]+-[0-9]+)- ]]; then
            echo "key=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          else
            echo "No Jira issue found in branch '$BRANCH'. Skipping."
            exit 0
          fi

      - name: Find Done transition
        id: transition
        env:
          JIRA_URL: ${{ secrets.JIRA_ACCOUNT_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_ACCOUNT_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_ISSUE_TRANSITION_TOKEN }}
        shell: bash
        run: |
          JIRA_KEY="${{ steps.jira.outputs.key }}"

          HTTP_CODE=$(curl -sS \
            -o /tmp/jira_transitions.json \
            -w "%{http_code}" \
            -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_URL/rest/api/3/issue/$JIRA_KEY/transitions") || {
            echo "::error::curl could not reach Jira."
            exit 1
          }

          echo "GET transitions -> HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Jira responded HTTP $HTTP_CODE (expected 200). Response body:"
            head -c 1000 /tmp/jira_transitions.json || true
            exit 1
          fi

          if ! jq empty /tmp/jira_transitions.json 2>/dev/null; then
            echo "::error::Jira returned HTTP 200 but the body is not valid JSON. Response body:"
            head -c 1000 /tmp/jira_transitions.json || true
            exit 1
          fi

          TRANSITION_ID=$(jq -r '
            .transitions[]
            | select(.to.name == "Done")
            | .id
          ' /tmp/jira_transitions.json | head -n1)

          if [ -z "$TRANSITION_ID" ] || [ "$TRANSITION_ID" = "null" ]; then
            echo "No transition to Done is available (issue may already be Done). Skipping."
            exit 0
          fi

          echo "id=$TRANSITION_ID" >> "$GITHUB_OUTPUT"

      - name: Transition Jira issue
        env:
          JIRA_URL: ${{ secrets.JIRA_ACCOUNT_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_ACCOUNT_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_ISSUE_TRANSITION_TOKEN }}
        shell: bash
        run: |
          JIRA_KEY="${{ steps.jira.outputs.key }}"

          HTTP_CODE=$(curl -sS \
            -o /tmp/jira_post.json \
            -w "%{http_code}" \
            -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -X POST \
            "$JIRA_URL/rest/api/3/issue/$JIRA_KEY/transitions" \
            -d "{\"transition\":{\"id\":\"${{ steps.transition.outputs.id }}\"}}") || {
            echo "::error::curl POST to Jira failed."
            exit 1
          }

          echo "POST transition -> HTTP $HTTP_CODE"

          # Jira returns 204 No Content on a successful transition (200 is also fine).
          if [ "$HTTP_CODE" != "204" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Jira transition POST failed with HTTP $HTTP_CODE. Response body:"
            head -c 1000 /tmp/jira_post.json || true
            exit 1
          fi

          echo "Transitioned $JIRA_KEY to Done."